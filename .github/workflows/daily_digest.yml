name: Daily Digest

on:
  schedule:
    - cron: "0 7 * * *"   # 7:00 AM UTC every day
  workflow_dispatch:        # allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 gen_digest.py

      - name: Commit and push updated digest + HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ index.html
          git diff --cached --quiet && echo "Nothing changed" && exit 0
          git commit -m "chore: digest $(date -u +%Y-%m-%d)"
          git push
